<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>AI Study Playlist</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🎧 AI Study Playlist</h1>

<p>
AI가 나에게 맞는 공부 음악을 추천합니다
</p>

</header>




<section class="box">


<h2>AI 플레이리스트 생성</h2>



<label>공부 목적</label>

<select id="purpose">

<option>시험 공부</option>
<option>영어 암기</option>
<option>독서</option>
<option>문제 풀이</option>

</select>




<label>공부 시간</label>

<select id="time">

<option>30분</option>
<option>1시간</option>
<option>2시간</option>
<option>3시간 이상</option>

</select>




<label>현재 상태</label>

<select id="mood">

<option>피곤함</option>
<option>집중하고 싶음</option>
<option>불안함</option>
<option>편안함</option>

</select>




<button onclick="makePlaylist()">

AI 플레이리스트 생성

</button>


</section>






<section id="result" class="box hidden">


<h2>🎵 추천 결과</h2>


<h3 id="title"></h3>


<p id="reason"></p>




<hr>



<h3>📺 YouTube 추천 음악</h3>


<a id="youtube" target="_blank">

▶ 공부용 Lo-fi 음악 듣기

</a>




<hr>




<h3>🤖 AI Original Music Playlist</h3>




<div class="player">


<h2 id="songTitle">

음악을 선택하세요

</h2>


<audio id="player" controls></audio>



<br>


<button onclick="prevSong()">

⏮ 이전

</button>


<button onclick="nextSong()">

다음 ⏭

</button>


</div>




<div id="playlist" class="playlist">


</div>




</section>




<script src="script.js"></script>


</body>

</html>
